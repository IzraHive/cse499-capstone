<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GAMS — Create Account</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#0f2744,#1a3a5c,#2c5282);min-height:100vh;display:flex;align-items:center;justify-content:center}
    .wrap{width:100%;max-width:440px;padding:20px}
    .logo{text-align:center;margin-bottom:28px}
    .logo h1{color:#fff;font-size:42px;font-weight:700;letter-spacing:4px}
    .logo p{color:#a8c4e0;font-size:13px;margin-top:6px}
    .card{background:#fff;border-radius:14px;padding:36px 40px;box-shadow:0 24px 80px rgba(0,0,0,.35)}
    .card h2{color:#1a3a5c;font-size:20px;margin-bottom:26px;text-align:center;font-weight:600}
    label{display:block;font-size:11px;font-weight:700;color:#666;margin-bottom:5px;text-transform:uppercase;letter-spacing:.6px}
    input{width:100%;padding:12px 14px;border:1.5px solid #e0e6ef;border-radius:8px;font-size:14px;margin-bottom:4px;outline:none;transition:border-color .2s}
    input:focus{border-color:#1a3a5c}
    .err{color:#c0392b;font-size:12px;min-height:16px;margin-bottom:12px}
    .btn{width:100%;padding:14px;background:#1a3a5c;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s;margin-top:4px}
    .btn:hover{background:#2c5282}
    #msg{text-align:center;font-size:13px;min-height:18px;margin-bottom:12px}
    .link{text-align:center;margin-top:20px;font-size:13px;color:#888}
    .link a{color:#1a3a5c;font-weight:600;text-decoration:none}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo"><h1>GAMS</h1><p>Grant Application Management System</p></div>
    <div class="card">
      <h2>Create Account</h2>
      <label>Full Name</label>
      <input type="text" id="name" placeholder="Your full name">
      <div class="err" id="nameErr"></div>
      <label>Email Address</label>
      <input type="email" id="email" placeholder="your@email.com">
      <div class="err" id="emailErr"></div>
      <label>Password</label>
      <input type="password" id="password" placeholder="Minimum 6 characters">
      <div class="err" id="passErr"></div>
      <div id="msg"></div>
      <button class="btn" onclick="doRegister()">Create Account</button>
      <div class="link"><a href="/index.html">← Back to login</a></div>
    </div>
  </div>
  <script>
    const API = '/api';
    async function doRegister() {
      ['nameErr','emailErr','passErr'].forEach(id => document.getElementById(id).textContent='');
      const fullName = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      let ok = true;
      if (!fullName)           { document.getElementById('nameErr').textContent='Full name is required.'; ok=false; }
      if (!email)              { document.getElementById('emailErr').textContent='Email is required.'; ok=false; }
      if (password.length < 6) { document.getElementById('passErr').textContent='Password must be at least 6 characters.'; ok=false; }
      if (!ok) return;
      const res   = await fetch(`${API}/auth/register`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({fullName, email, password})
      });
      const msgEl = document.getElementById('msg');
      if (res.ok) {
        msgEl.style.color='#1e5c2e'; msgEl.textContent='Account created! Redirecting to login...';
        setTimeout(()=>window.location.href='/index.html', 1500);
      } else {
        const e = await res.json().catch(()=>({}));
        msgEl.style.color='#c0392b'; msgEl.textContent=e.message||'Registration failed. Email may already be registered.';
      }
    }
  </script>
</body>
</html>
