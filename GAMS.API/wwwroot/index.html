<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GAMS — Login</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#0f2744,#1a3a5c,#2c5282);min-height:100vh;display:flex;align-items:center;justify-content:center}
    .wrap{width:100%;max-width:440px;padding:20px}
    .logo{text-align:center;margin-bottom:28px}
    .logo h1{color:#fff;font-size:42px;font-weight:700;letter-spacing:4px;text-shadow:0 2px 8px rgba(0,0,0,.3)}
    .logo p{color:#a8c4e0;font-size:13px;margin-top:6px;line-height:1.6}
    .card{background:#fff;border-radius:14px;padding:36px 40px;box-shadow:0 24px 80px rgba(0,0,0,.35)}
    .card h2{color:#1a3a5c;font-size:20px;margin-bottom:26px;text-align:center;font-weight:600}
    label{display:block;font-size:11px;font-weight:700;color:#666;margin-bottom:5px;text-transform:uppercase;letter-spacing:.6px}
    input{width:100%;padding:12px 14px;border:1.5px solid #e0e6ef;border-radius:8px;font-size:14px;margin-bottom:18px;outline:none;transition:border-color .2s}
    input:focus{border-color:#1a3a5c;box-shadow:0 0 0 3px rgba(26,58,92,.08)}
    .btn{width:100%;padding:14px;background:#1a3a5c;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s}
    .btn:hover{background:#2c5282}
    .btn:disabled{opacity:.6;cursor:not-allowed}
    #error{color:#c0392b;font-size:13px;text-align:center;min-height:18px;margin-bottom:14px}
    .link{text-align:center;margin-top:20px;font-size:13px;color:#888}
    .link a{color:#1a3a5c;font-weight:600;text-decoration:none}
    .link a:hover{text-decoration:underline}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">
      <h1>GAMS</h1>
      <p>Grant Application Management System<br>Ministry of Labour &amp; Social Security</p>
    </div>
    <div class="card">
      <h2>Sign In</h2>
      <label>Email Address</label>
      <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
      <label>Password</label>
      <input type="password" id="password" placeholder="Your password">
      <div id="error"></div>
      <button class="btn" id="btn" onclick="doLogin()">Sign In</button>
      <div class="link">No account? <a href="/register.html">Register here</a></div>
    </div>
  </div>
  <script>
    const API = '/api';
    async function doLogin() {
      const btn   = document.getElementById('btn');
      const errEl = document.getElementById('error');
      errEl.textContent = '';
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) { errEl.textContent = 'Please enter your email and password.'; return; }
      btn.disabled = true; btn.textContent = 'Signing in...';
      try {
        const res  = await fetch(`${API}/auth/login`, {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({email, password})
        });
        if (!res.ok) {
          const e = await res.json().catch(()=>({}));
          errEl.textContent = e.message || 'Invalid email or password.';
          btn.disabled=false; btn.textContent='Sign In'; return;
        }
        const data = await res.json();
        sessionStorage.setItem('gams_user', JSON.stringify(data));
        if (data.roles.includes('Admin') || data.roles.includes('SocialWorker') || data.roles.includes('Finance'))
          window.location.href = '/admin.html';
        else
          window.location.href = '/dashboard.html';
      } catch(e) {
        errEl.textContent = 'Connection error. Please try again.';
        btn.disabled=false; btn.textContent='Sign In';
      }
    }
    document.addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); });
  </script>
</body>
</html>
